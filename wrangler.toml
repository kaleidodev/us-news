name = "us-news"
main = "src/index.js"
compatibility_date = "2024-12-16"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages build configuration
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["app/**/*.tsx", "app/**/*.ts", "public/**/*"]

[env.production]
# Production environment settings
routes = [
  { pattern = "*.js", custom_domain = true },
  { pattern = "*.css", custom_domain = true },
  { pattern = "*.woff2", custom_domain = true }
]

[env.preview]
# Preview environment settings
